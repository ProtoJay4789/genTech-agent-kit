# GenTech Agent — Config Template
#
# This is a REFERENCE config showing our defaults.
# The Hermes installer will NOT overwrite your existing config.yaml.
# It merges distribution files into your setup.
#
# To adopt our model defaults, uncomment sections below.
# To keep your own model setup, leave this file as-is.

# ─── MODEL (uncomment to adopt our defaults) ───────────────────────
# We use Xiaomi MiMo via custom provider, but use whatever works for you.
#
# model:
#   default: mimo-v2.5
#   provider: custom
#
# custom_providers:
#   - name: xiaomi
#     base_url: https://token-plan-sgp.xiaomimimo.com/v1
#     model: mimo-v2.5
#     api_key: ${XIAOMI_API_KEY}

# ─── ALTERNATIVE PROVIDERS ─────────────────────────────────────────
# Pick what matches your setup. Common options:
#
# Local (Ollama, LM Studio, llama.cpp):
#   model:
#     default: llama3.1
#     provider: custom
#     base_url: http://localhost:11434/v1
#     api_key: ollama
#
# OpenCode Go (cloud, $10/mo):
#   model:
#     default: qwen3.6-plus
#     provider: opencode-go
#
# Anthropic:
#   model:
#     default: claude-sonnet-4
#     provider: anthropic
#
# OpenRouter (multi-model):
#   model:
#     default: anthropic/claude-sonnet-4
#     provider: openrouter

# ─── AGENT BEHAVIOR ────────────────────────────────────────────────
# These settings work regardless of your model provider.

agent:
  max_turns: 90
  tool_use_enforcement: auto
  task_completion_guidance: true
  parallel_tool_call_guidance: true

# ─── SECURITY ──────────────────────────────────────────────────────
approvals:
  mode: manual  # 'smart' for auto-approve low-risk, 'off' to skip all

# ─── COMPRESSION ───────────────────────────────────────────────────
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20

# ─── VOICE (optional) ─────────────────────────────────────────────
# Uncomment if you want voice output. Edge TTS is free, no key needed.
#
# tts:
#   provider: edge
#   voice: en-US-AndrewNeural
#
# stt:
#   enabled: true
#   provider: local
