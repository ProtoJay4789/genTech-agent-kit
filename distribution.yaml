# GenTech Agent — Hermes Distribution
# Install: hermes install --from github.com/ProtoJay4789/genTech-agent-kit

name: gentech
version: 0.1.0
description: >
  The GenTech agent — DeFi operations, portfolio tracking, opportunity scanning,
  and autonomous research. AAE-compatible agent standard with identity, enforcement,
  and audit baked in.
author: GenTech Labs
license: MIT
homepage: https://github.com/ProtoJay4789/genTech-agent-kit

# What this distribution installs
components:
  - type: skills
    source: skills/
    description: Core agent skills (wake-up, context, DeFi, research)
  - type: cron
    source: cron/
    description: Scheduled tasks (portfolio health, opportunity scanning)
  - type: mcp
    source: mcp.json
    description: MCP server connections (BlockRun, WURK, Pay)
  - type: vault
    source: core/vault/
    description: Vault structure template

# IMPORTANT: This distribution does NOT overwrite your existing config.
# It adds skills, cron jobs, MCP connections, and vault structure.
# Your model/provider setup stays exactly as-is.
#
# If you WANT to adopt our model defaults, copy config.yaml manually:
#   cp config.yaml ~/.hermes/config.yaml
#
# Or cherry-pick sections from config.yaml into your existing config.

# Environment variables for MCP connections (optional)
optional_env:
  - name: BLOCKRUN_API_KEY
    description: BlockRun API key for x402 payments and AI tools
    required: false
  - name: WURK_API_KEY
    description: WURK.fun API key for agent-to-human microtasks
    required: false
  - name: ELEVENLABS_API_KEY
    description: ElevenLabs TTS for voice output
    required: false
  - name: GITHUB_TOKEN
    description: GitHub PAT for repo access and portfolio sync
    required: false

# Compatible Hermes version
min_hermes_version: "0.13.0"
