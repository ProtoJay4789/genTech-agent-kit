<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{HUB_NAME}} — GenTech Hub</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel-bg: #12121a;
            --panel-border: #1e1e2e;
            --text: #e0e0e0;
            --text-dim: #888;
            --gold: #c9a84c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 72px; }
        .hub-header { background: linear-gradient(135deg, var(--gold), #e8652a); padding: 20px; text-align: center; }
        .hub-header h1 { font-size: 1.3rem; margin: 0; }
        .tab-section { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
        .tab-section.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel-bg); border-top: 1px solid var(--panel-border); display: flex; justify-content: space-around; padding: 8px 0; }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 16px; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn .nav-icon { font-size: 1.5rem; }
    </style>
</head>
<body>

    <header class="hub-header">
        <h1>{{HUB_ICON}} {{HUB_NAME}}</h1>
    </header>

    <!-- Tab sections -->
    <section class="tab-section active" id="tab-home">
        <h2>Home</h2>
        <p>Content here.</p>
    </section>

    <section class="tab-section" id="tab-profile">
        <h2>Profile</h2>
        <p>Content here.</p>
    </section>

    <section class="tab-section" id="tab-settings">
        <h2>Settings</h2>
        <p>Content here.</p>
    </section>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </button>
        <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </button>
        <button class="nav-btn" id="nav-settings" onclick="switchTab('settings')">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
        </button>
    </nav>

    <script>
        // ✅ CRITICAL: use a unique localStorage key per hub to avoid collisions
        const HUB_LS_KEY = '{{HUB_SLUG}}-hub-default-tab';
        const DEFAULT_TAB = 'home';

        function switchTab(tab) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            const section = document.getElementById('tab-' + tab);
            const btn = document.getElementById('nav-' + tab);
            if (section) section.classList.add('active');
            if (btn) btn.classList.add('active');
            window.scrollTo(0, 0);
        }

        function getSavedTab() {
            return localStorage.getItem(HUB_LS_KEY) || DEFAULT_TAB;
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchTab(getSavedTab());
        });
    </script>

</body>
</html>
